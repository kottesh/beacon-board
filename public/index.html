<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Beacon Board</title>
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; font-family: ui-sans-serif, system-ui, sans-serif; background: #0d1117; color: #e6edf3; }
      #app { max-width: 720px; margin: 48px auto; padding: 0 20px; }
      header { display: flex; align-items: baseline; justify-content: space-between; border-bottom: 1px solid #30363d; padding-bottom: 12px; }
      h1 { font-size: 28px; margin: 0; }
      .overall { font-weight: 700; font-size: 18px; margin: 0; }
      .incident { color: #8b949e; }
      table { width: 100%; border-collapse: collapse; margin-top: 16px; }
      th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #21262d; }
      th { color: #8b949e; font-weight: 600; font-size: 13px; }
      .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 8px; }
      footer { margin-top: 24px; color: #6e7681; font-size: 12px; }
    </style>
  </head>
  <body>
    <div id="app">Loading…</div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
