<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Beacon Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --night: #0a0e14;
        --panel: #111823;
        --panel-2: #0d141d;
        --bone: #e8e6df;
        --rule: #263242;
        --muted: #6b7a8f;
        --clear: #5fd08a;
        --caution: #e8b23a;
        --alarm: #e5484d;
        --beam: var(--clear);
      }
      [data-state='degraded'] { --beam: var(--caution); }
      [data-state='down'] { --beam: var(--alarm); }

      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background:
          radial-gradient(120% 80% at 50% -10%, #16202e 0%, var(--night) 55%) fixed,
          var(--night);
        color: var(--bone);
        font-family: 'Space Grotesk', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      .deck {
        max-width: 820px;
        margin: 0 auto;
        padding: clamp(40px, 8vh, 96px) 24px 48px;
      }

      /* ---- hero ---- */
      .hero { position: relative; text-align: center; padding-bottom: 44px; }

      .lamp {
        position: relative;
        width: 168px;
        height: 168px;
        margin: 0 auto 28px;
      }
      .lamp__sweep {
        position: absolute;
        inset: -30%;
        border-radius: 50%;
        background: conic-gradient(
          from 0deg,
          transparent 0deg,
          color-mix(in srgb, var(--beam) 70%, transparent) 26deg,
          transparent 62deg,
          transparent 360deg
        );
        filter: blur(2px);
        animation: sweep 6s linear infinite;
      }
      .lamp__core {
        position: absolute;
        inset: 38%;
        border-radius: 50%;
        background: var(--beam);
        box-shadow:
          0 0 18px 2px color-mix(in srgb, var(--beam) 80%, transparent),
          0 0 60px 10px color-mix(in srgb, var(--beam) 35%, transparent);
        animation: pulse 6s ease-in-out infinite;
      }
      .lamp::after {
        content: '';
        position: absolute;
        inset: 26%;
        border-radius: 50%;
        border: 1px solid color-mix(in srgb, var(--beam) 40%, transparent);
      }
      @keyframes sweep { to { transform: rotate(360deg); } }
      @keyframes pulse {
        0%, 100% { opacity: 0.85; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.08); }
      }

      .eyebrow {
        margin: 0 0 14px;
        font-size: 11px;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .verdict {
        margin: 0;
        font-size: clamp(52px, 12vw, 108px);
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 0.92;
        color: var(--beam);
      }
      .verdict__line {
        margin: 18px auto 0;
        max-width: 34ch;
        color: var(--bone);
        opacity: 0.82;
        font-size: 16px;
      }
      .tally {
        margin: 22px 0 0;
        font-family: 'JetBrains Mono', monospace;
        font-size: 12.5px;
        letter-spacing: 0.02em;
        color: var(--muted);
      }
      .tally b { color: var(--bone); font-weight: 600; }
      .tally span { opacity: 0.4; margin: 0 2px; }

      /* ---- station log ---- */
      .log {
        border-top: 1px solid var(--rule);
        border-bottom: 1px solid var(--rule);
      }
      .log__head,
      .station {
        display: grid;
        grid-template-columns: 18px 1.1fr 0.9fr 1.3fr 0.7fr 1.6fr;
        align-items: center;
        gap: 14px;
      }
      .log__head {
        padding: 14px 4px;
        font-size: 10px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--muted);
        border-bottom: 1px solid var(--rule);
      }
      .log__head span:first-child { grid-column: 1 / 3; }
      .log__list { list-style: none; margin: 0; padding: 0; }
      .station {
        padding: 16px 4px;
        border-bottom: 1px solid color-mix(in srgb, var(--rule) 55%, transparent);
        font-size: 15px;
      }
      .station:last-child { border-bottom: 0; }
      .station__beacon {
        width: 10px; height: 10px; border-radius: 50%;
        justify-self: center;
      }
      .station--operational .station__beacon {
        background: var(--clear);
        box-shadow: 0 0 10px 1px color-mix(in srgb, var(--clear) 70%, transparent);
      }
      .station--degraded .station__beacon {
        background: var(--caution);
        box-shadow: 0 0 10px 1px color-mix(in srgb, var(--caution) 70%, transparent);
        animation: blink 1.6s step-end infinite;
      }
      .station--down .station__beacon {
        background: var(--alarm);
        box-shadow: 0 0 12px 2px color-mix(in srgb, var(--alarm) 80%, transparent);
        animation: blink 0.9s step-end infinite;
      }
      @keyframes blink { 50% { opacity: 0.25; } }

      .station__name { font-weight: 500; }
      .station__state {
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .station--operational .station__state { color: var(--clear); }
      .station--degraded .station__state { color: var(--caution); }
      .station--down .station__state { color: var(--alarm); }

      .station__signal {
        height: 4px;
        border-radius: 2px;
        background: color-mix(in srgb, var(--rule) 70%, transparent);
        overflow: hidden;
      }
      .station__signal-fill {
        display: block; height: 100%;
        background: var(--muted);
      }
      .station--operational .station__signal-fill { background: var(--clear); }
      .station--degraded .station__signal-fill { background: var(--caution); }
      .station--down .station__signal-fill { background: var(--alarm); }

      .station__latency {
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        color: var(--muted);
        text-align: right;
      }
      .station__latency b { color: var(--bone); font-weight: 600; }
      .station__note { font-size: 13px; color: var(--muted); }

      /* ---- readout ---- */
      .readout {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 28px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        color: var(--muted);
      }
      .readout__mark { color: var(--beam); }
      .readout__stamp { margin-left: auto; letter-spacing: 0.04em; }

      /* ---- responsive ---- */
      @media (max-width: 620px) {
        .log__head { display: none; }
        .station {
          grid-template-columns: 14px 1fr auto;
          grid-template-areas:
            'beacon name state'
            'beacon signal signal'
            'beacon note latency';
          row-gap: 8px;
        }
        .station__beacon { grid-area: beacon; align-self: start; margin-top: 5px; }
        .station__name { grid-area: name; }
        .station__state { grid-area: state; text-align: right; }
        .station__signal { grid-area: signal; }
        .station__latency { grid-area: latency; text-align: right; }
        .station__note { grid-area: note; }
      }

      @media (prefers-reduced-motion: reduce) {
        .lamp__sweep, .lamp__core, .station__beacon { animation: none !important; }
      }
      :focus-visible { outline: 2px solid var(--beam); outline-offset: 3px; }
    </style>
  </head>
  <body>
    <div id="app">Loading…</div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
